name: securecity
description: SecureCity - AI-Powered Smart Urban Safety System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  animate_do: ^3.3.1
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  web_socket_channel: ^3.0.1
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
